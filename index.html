              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 20 }}>Energieeffizienzklassen-Skala</div>
              <KlassenScale current={currentKlasse} after={afterKlasse} />
            </div>

            {improvement > 0 && (
              <div style={{ marginTop: 16, padding: '16px 20px', borderRadius: 12, background: '#05966910', border: '1px solid #05966930', fontSize: 13, color: 'var(--muted)', lineHeight: 1.7 }}>
                <strong style={{ color: 'var(--text)' }}>CO₂-Kosteneinsparung:</strong> Verbesserung von {currentK.label} auf {afterK.label} reduziert Heizenergiebedarf erheblich.
                Bei {currentKlasse >= 6 ? 'Klasse F/G' : 'schlechter Energieklasse'} trägt Vermieter <strong style={{ color: '#D97706' }}>90 %</strong> der CO₂-Abgabe (CO2KostAufG).
                Nach Sanierung kann dieser Anteil auf <strong style={{ color: '#059669' }}>{afterKlasse <= 1 ? '0 %' : afterKlasse <= 3 ? '25–50 %' : '75 %'}</strong> sinken.
              </div>
            )}

            <div style={{ marginTop: 20, display:'flex', gap:12 }}>
              <button onClick={() => exportEnergiePDF({
                baujahr, zustand,
                zustandLabel: (ZUSTAENDE.find(z => z.value === zustand) || {}).label || zustand,
                selMass,
                selMassLabels: selMass.map(id => {
                  const m = MASSN_EN.find(m => m.id === id);
                  return m ? m.label.replace(/[^\w\säöüÄÖÜß-]/g, '').trim() : id;
                }),
                massnahmenDetails: selMass.map(id => {
                  const m = MASSN_EN.find(m => m.id === id);
                  return m ? {
                    label: m.label.replace(/[^\w\säöüÄÖÜß-]/g, '').trim(),
                    kosten: m.kosten,
                    klassen: m.klassen
                  } : { label: id, kosten: '-', klassen: 0 };
                }),
                currentK, afterK, improvement
              })} style={{
                background: 'var(--accent)', color: 'white', border: 'none',
                padding: '12px 20px', borderRadius: 9, fontSize: 14, fontWeight: 600,
                cursor: 'pointer', fontFamily: 'inherit',
                boxShadow: '0 2px 10px var(--accent-glow)'
              }}>↓ PDF herunterladen</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Potenzialanalyse ──────────────────────────────────────────────────────────
function Potenzialanalyse() {
  const [kaufpreis, setKaufpreis] = React.useState(350000);
  const [flaeche, setFlaeche] = React.useState(80);
  const [baujahr, setBaujahr] = React.useState(1975);
  const [miete, setMiete] = React.useState(1200);
  const [energieklasse, setEnergieklasse] = React.useState('F');
  const [zustand, setZustand] = React.useState('sanierungsbedarf');

  const eKlasseMap = { 'A+':0,'A':1,'B':2,'C':3,'D':4,'E':5,'F':6,'G':7 };
  const eIdx = eKlasseMap[energieklasse] ?? 6;

  // Sanierungspotenzial
  const sanBedarf = eIdx >= 6 ? 'Sehr hoch' : eIdx >= 5 ? 'Hoch' : eIdx >= 4 ? 'Mittel' : 'Gering';
  const sanKostenQm = eIdx >= 6 ? 900 : eIdx >= 5 ? 650 : eIdx >= 4 ? 400 : 200;
  const sanKosten = sanKostenQm * flaeche;
  const foerderRate = eIdx >= 5 ? 0.35 : eIdx >= 4 ? 0.25 : 0.15;
  const foerderung = sanKosten * foerderRate;
  const nettoSan = sanKosten - foerderung;

  // Mietpotenzial
  const mietSteigerung = eIdx >= 6 ? 0.22 : eIdx >= 5 ? 0.16 : eIdx >= 4 ? 0.10 : 0.05;
  const mietNachSan = miete * (1 + mietSteigerung);
  const mehrertrag = (mietNachSan - miete) * 12;

  // Verkehrswert
  const wertsteigerung = eIdx >= 6 ? 0.25 : eIdx >= 5 ? 0.18 : eIdx >= 4 ? 0.12 : 0.06;
  const wertNachSan = kaufpreis + sanKosten * 1.5;
  const wertgewinn = wertNachSan - kaufpreis;

  // ROI
  const roi = nettoSan > 0 ? mehrertrag / nettoSan * 100 : 0;

  const afterKlasse = Math.max(0, eIdx - (eIdx >= 5 ? 3 : 2));
  const afterKLabel = KLASSEN[afterKlasse]?.label || 'A';

  const KLASSEN_OPT = ['G','F','E','D','C','B','A','A+'].map(k => ({ value: k, label: k }));
  const ZUSTAENDE = [
    { value: 'sanierungsbedarf', label: 'Sanierungsbedarf' },
    { value: 'teilsaniert', label: 'Teilsaniert' },
    { value: 'gepflegt', label: 'Gepflegt' },
  ];

  const barMax = Math.max(kaufpreis, wertNachSan);

  return (
    <div style={{ minHeight: '100vh', paddingTop: 60, background: 'var(--bg)' }}>
      <div style={{ background: 'var(--bg2)', borderBottom: '1px solid var(--border)', padding: '36px 48px 28px' }}>
        <div style={{ maxWidth: 1440, margin: '0 auto' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--accent)', letterSpacing: '1.5px', textTransform: 'uppercase', marginBottom: 10 }}>🔭 Potenzialanalyse</div>
          <h1 style={{ fontSize: 36, fontWeight: 700, letterSpacing: '-1.2px', marginBottom: 8 }}>Sanierungs-, Miet- & Wertpotenzial</h1>
          <p style={{ fontSize: 14, color: 'var(--muted)', maxWidth: 560 }}>Was steckt wirklich in diesem Objekt? Sanierungspotenzial, Mietpotenzial und erreichbarer Verkehrswert — konkret in Euro.</p>
        </div>
      </div>
      <div style={{ maxWidth: 1440, margin: '0 auto', padding: '32px 48px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '320px 1fr', gap: 28, alignItems: 'start' }}>
          {/* Inputs */}
          <div style={{ background: 'var(--card)', borderRadius: 18, border: '1px solid var(--border)', padding: '24px', position: 'sticky', top: 76 }}>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 20 }}>📍 Objektdaten eingeben</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <NI label="Kaufpreis / aktueller Wert" value={kaufpreis} onChange={setKaufpreis} suffix="€" step={5000} />
              <NI label="Wohnfläche" value={flaeche} onChange={setFlaeche} suffix="m²" step={5} />
              <NI label="Baujahr" value={baujahr} onChange={setBaujahr} suffix="" step={1} />
              <NI label="Aktuelle Kaltmiete / Mo." value={miete} onChange={setMiete} suffix="€/Mo" step={50} />
              <SI label="Energieklasse aktuell" value={energieklasse} onChange={setEnergieklasse} options={KLASSEN_OPT} />
              <SI label="Zustand" value={zustand} onChange={setZustand} options={ZUSTAENDE} />
            </div>
          </div>

          {/* Results */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {/* Sanierungspotenzial */}
            <div style={{ background: 'var(--card)', borderRadius: 18, border: '1px solid var(--border)', padding: '24px' }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>🔨 Sanierungspotenzial</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 16 }}>
                <MC label="Sanierungsbedarf" value={sanBedarf} unit="" status={eIdx >= 6 ? 'red' : eIdx >= 4 ? 'amber' : 'green'} />
                <MC label="Sanierungskosten ca." value={fmtE(sanKosten)} unit="€" status="neutral" />
                <MC label="Förderung ca." value={'−' + fmtE(foerderung)} unit="€" status="green" />
                <MC label="Netto-Investition" value={fmtE(nettoSan)} unit="€" status="neutral" />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 9, background: 'var(--bg)', border: '1px solid var(--border)' }}>
                <span style={{ fontSize: 13, color: 'var(--muted)' }}>Energieklasse {energieklasse} → nach Vollsanierung: </span>
                <span style={{ fontFamily: '"DM Mono",monospace', fontWeight: 700, fontSize: 16, color: KLASSEN[afterKlasse]?.color }}>{afterKLabel}</span>
                <span style={{ fontSize: 11, color: '#059669', fontWeight: 600 }}>+{eIdx - afterKlasse} Klassen Verbesserung</span>
              </div>
            </div>

            {/* Mietpotenzial */}
            <div style={{ background: 'var(--card)', borderRadius: 18, border: '1px solid var(--border)', padding: '24px' }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>💶 Mietpotenzial</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 16 }}>
                <MC label="Aktuelle Miete / Mo." value={fmtE(miete)} unit="€" status="neutral" />
                <MC label="Miete nach Sanierung" value={fmtE(mietNachSan)} unit="€" status="green" />
                <MC label="Jährl. Mehrertrag" value={'+' + fmtE(mehrertrag)} unit="€" status="green" />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {[{ l: 'Aktuell', v: miete, total: miete * 12 }, { l: 'Nach Sanierung', v: mietNachSan, total: mietNachSan * 12 }].map((r, i) => (
                  <div key={i}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span style={{ fontSize: 12, color: 'var(--muted)' }}>{r.l}</span>
                      <span style={{ fontFamily: '"DM Mono",monospace', fontSize: 12, fontWeight: 600 }}>{fmtE(r.v)} €/Mo ({fmtE(r.total)} €/J)</span>
                    </div>
                    <div style={{ height: 8, borderRadius: 99, background: 'var(--border)' }}>
                      <div style={{ height: '100%', borderRadius: 99, background: i === 0 ? 'var(--muted)' : '#059669', width: `${r.v / mietNachSan * 100}%`, transition: 'width 0.5s' }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Verkehrswert */}
            <div style={{ background: 'var(--card)', borderRadius: 18, border: '1px solid var(--border)', padding: '24px' }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>📈 Wertentwicklung durch Sanierung</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 16 }}>
                <MC label="Aktueller Wert" value={fmtE(kaufpreis)} unit="€" status="neutral" />
                <MC label="Nach Vollsanierung" value={fmtE(wertNachSan)} unit="€" status="green" />
                <MC label="Wertgewinn" value={'+' + fmtE(wertgewinn)} unit="€" status="green" />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {[
                  { l: 'Aktueller Wert', v: kaufpreis, color: 'var(--muted)' },
                  { l: 'Nach Vollsanierung (Schätzung)', v: wertNachSan, color: '#059669' },
                ].map((r, i) => (
                  <div key={i}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span style={{ fontSize: 12, color: 'var(--muted)' }}>{r.l}</span>
                      <span style={{ fontFamily: '"DM Mono",monospace', fontSize: 12, fontWeight: 600 }}>{fmtE(r.v)} €</span>
                    </div>
                    <div style={{ height: 10, borderRadius: 99, background: 'var(--border)' }}>
                      <div style={{ height: '100%', borderRadius: 99, background: r.color, width: `${r.v / barMax * 100}%`, transition: 'width 0.5s' }} />
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 16, padding: '10px 14px', borderRadius: 8, background: 'var(--bg)', fontSize: 12, color: 'var(--muted)' }}>
                Sanierungsrendite: <strong style={{ color: 'var(--text)' }}>Mehrertrag / Nettoinvestition = {fmt(roi, 1)} % p.a.</strong>
                {roi > 8 && <span style={{ color: '#059669', marginLeft: 8, fontWeight: 600 }}>✓ Sehr attraktiv</span>}
                {roi >= 4 && roi <= 8 && <span style={{ color: '#D97706', marginLeft: 8 }}>⚠ Prüfen</span>}
              </div>
            </div>

            <div style={{ display:'flex', gap:12 }}>
              <button onClick={() => exportPotenzialPDF({
                kaufpreis, flaeche, baujahr, miete, energieklasse, zustand,
                zustandLabel: (ZUSTAENDE.find(z => z.value === zustand) || {}).label || zustand,
                sanBedarf, sanKosten, sanKostenQm, foerderung, foerderRate, nettoSan,
                mietSteigerung, mietNachSan, mehrertrag,
                wertNachSan, wertgewinn, roi, afterKLabel
              })} style={{
                background: 'var(--accent)', color: 'white', border: 'none',
                padding: '12px 20px', borderRadius: 9, fontSize: 14, fontWeight: 600,
                cursor: 'pointer', fontFamily: 'inherit',
                boxShadow: '0 2px 10px var(--accent-glow)'
              }}>↓ PDF herunterladen</button>
            </div>

            <div style={{ fontSize: 11, color: 'var(--muted)', padding: '10px 14px', borderRadius: 8, background: 'var(--bg)', border: '1px solid var(--border)', lineHeight: 1.6 }}>
              Alle Werte sind Schätzungen auf Basis von BKI-Kostenkennwerten und marktüblichen Wertsteigerungen. Kein Ersatz für ein Gutachten.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function WissenSection({ section }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden', marginBottom: 10 }}>
      <div onClick={() => setOpen(!open)} style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '16px 20px', cursor: 'pointer', background: open ? 'var(--accent-dim)' : 'var(--card)',
        transition: 'background 0.2s'
      }}>
        <div>
          <span style={{ fontWeight: 700, fontSize: 15 }}>{section.title}</span>
          {section.badge && <span style={{ marginLeft: 10, fontSize: 11, fontWeight: 600, color: 'var(--accent)', background: 'var(--accent-dim)', padding: '2px 9px', borderRadius: 100 }}>{section.badge}</span>}
        </div>
        <span style={{ fontSize: 18, color: 'var(--muted)', transform: open ? 'rotate(45deg)' : 'none', transition: 'transform 0.2s' }}>+</span>
      </div>
      {open && (
        <div style={{ padding: '20px', borderTop: '1px solid var(--border)', fontSize: 14, color: 'var(--muted)', lineHeight: 1.75, background: 'var(--card)' }}>
          {section.content.split('\n\n').map((para, i) => (
            <p key={i} style={{ marginBottom: 12 }} dangerouslySetInnerHTML={{
              __html: para.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
            }} />
          ))}
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{ border: '1px solid var(--border)', borderRadius: 14, overflow: 'hidden', marginBottom: 14 }}>

          <span style={{ fontWeight: 700, fontSize: 15 }}>{list.title}</span>

  );

function CheckBox() {
  const [checked, setChecked] = React.useState(false);
  return (
    <div onClick={() => setChecked(!checked)} style={{
      width: 18, height: 18, borderRadius: 4, border: `2px solid ${checked ? 'var(--accent)' : 'var(--border)'}`,
      background: checked ? 'var(--accent)' : 'transparent',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0, marginTop: 2, cursor: 'pointer', transition: 'all 0.15s'
    }}>
      {checked && <span style={{ color: 'white', fontSize: 11, fontWeight: 700 }}>✓</span>}
    </div>
  );
}

function getProStorage() {
  try {
    const raw = localStorage.getItem(PRO_STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function setProStorage(arr) {
  try { localStorage.setItem(PRO_STORAGE_KEY, JSON.stringify(arr)); }
  catch(e) { console.warn('Pro storage failed:', e); }
}

// Berechne alle Kennzahlen aus einem Objekt
function computeFromObjekt(obj) {
  const darlehen = Math.max(0, obj.kaufpreis - obj.ek);
  const gesamtinvest = obj.kaufpreis * (1 + obj.nk/100);
  const rate = darlehen * (obj.zins + obj.tilgung) / 100 / 12;
  const params = {
    ...obj,
    standortLabel: (STANDORTE_PRO.find(s => s.value === obj.standort) || {}).label || obj.standort,
    darlehen, gesamtinvest, rate,
    stActive: true,
    mietSteigerung: obj.mietSteigerung / 100,
    leerstand: obj.leerstand / 100,
    wertSteigerung: obj.wertSteigerung / 100,
    kostenSteigerung: 0.025,
    haltedauer: 10,
  };
  try {
    const analysis = buildProAnalysis(params);
    return { params, analysis, error: null };
  } catch(e) {
    console.error('compute crash:', e);
    return { params, analysis: null, error: e.message };
  }
}

// Workspace nach Freischaltung
function ProWorkspace() {
  const [analysen, setAnalysen] = React.useState(getProStorage());
  const [aktivId, setAktivId] = React.useState(analysen[0]?.id || null);
  const [step, setStep] = React.useState(1); // 1=Objekt, 2=Finanzierung, 3=Annahmen, 4=Auswertung
  const [compareIds, setCompareIds] = React.useState([]); // für Vergleichs-Modus
  const [view, setView] = React.useState('wizard'); // 'wizard' | 'compare'
  const [isMobile, setIsMobile] = React.useState(typeof window!=='undefined' && window.innerWidth <= 900);

  React.useEffect(() => {
    const r = () => setIsMobile(window.innerWidth <= 900);
    window.addEventListener('resize', r);
    return () => window.removeEventListener('resize', r);
  }, []);

  // Wenn keine Analyse, eine erstellen
  React.useEffect(() => {
    if (analysen.length === 0) {
      const fresh = defaultObjekt('Mein erstes Objekt');
      const next = [fresh];
      setAnalysen(next);
      setProStorage(next);
      setAktivId(fresh.id);
    } else if (!aktivId) {
      setAktivId(analysen[0].id);
    }
  }, []);

  const aktiv = analysen.find(a => a.id === aktivId);

  const updateAktiv = (patch) => {
    const next = analysen.map(a => a.id === aktivId ? {...a, ...patch} : a);
    setAnalysen(next);
    setProStorage(next);
  };

  const neueAnalyse = () => {
    const n = defaultObjekt('Objekt ' + (analysen.length + 1));
    const next = [...analysen, n];
    setAnalysen(next);
    setProStorage(next);
    setAktivId(n.id);
    setStep(1);
  };

  const loescheAnalyse = (id) => {
    if (!confirm('Diese Analyse wirklich löschen?')) return;
    const next = analysen.filter(a => a.id !== id);
    setAnalysen(next);
    setProStorage(next);
    if (aktivId === id) setAktivId(next[0]?.id || null);
  };

  if (!aktiv) {
    return <div style={{ padding:'120px 40px', textAlign:'center' }}>Lade…</div>;
  }

  return (
    <div style={{ background:'var(--bg)', minHeight:'100vh', paddingTop:60 }}>
      {/* Top-Bar */}
      <div style={{ background:'var(--card)', borderBottom:'1px solid var(--border)' }}>
        <div className="pro-topbar" style={{ maxWidth:1440, margin:'0 auto', padding:'14px 32px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, flexWrap:'wrap' }}>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <span style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'4px 10px', borderRadius:99, background:'var(--accent-dim)', color:'var(--accent)', fontSize:11, fontWeight:800, letterSpacing:'0.5px' }}>★ PRO</span>
            <div>
              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.5px' }}>Asset Management Suite</div>
              <div style={{ fontWeight:700, fontSize:15 }}>Investitionsanalyse</div>
            </div>
          </div>

          <div className="pro-topbar-actions" style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
            <button onClick={()=>setView('wizard')} style={pillBtn(view==='wizard')}>Analyse</button>
            <button onClick={()=>setView('compare')} style={pillBtn(view==='compare')}>Vergleich</button>
            <div style={{ width:1, height:20, background:'var(--border)', margin:'0 6px' }}/>
            <button onClick={neueAnalyse} style={pillBtn(false)}>+ Neue Analyse</button>
          </div>
        </div>
      </div>

      {view === 'compare' ? (
        <CompareView analysen={analysen} compareIds={compareIds} setCompareIds={setCompareIds} />
      ) : (
        <div style={{ maxWidth:1440, margin:'0 auto', padding: isMobile ? '20px 16px' : '32px 32px', display:'grid', gridTemplateColumns: isMobile ? '1fr' : '280px 1fr', gap:24 }}>
          {/* Sidebar — Analysen-Liste */}
          <div>
            <div style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'1px', marginBottom:12, padding:'0 4px' }}>
              Meine Analysen ({analysen.length})
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:20 }}>
              {analysen.map(a => (
                <div key={a.id} onClick={()=>setAktivId(a.id)} style={{
                  padding:'12px 14px', borderRadius:10,
                  background: a.id===aktivId?'var(--accent-dim)':'var(--card)',
                  border:`1px solid ${a.id===aktivId?'var(--accent)':'var(--border)'}`,
                  cursor:'pointer', transition:'all 0.15s',
                  display:'flex', alignItems:'center', justifyContent:'space-between', gap:8
                }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:600, fontSize:13, color: a.id===aktivId?'var(--accent)':'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{a.name}</div>
                    <div style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>
                      {a.kaufpreis.toLocaleString('de-DE')} € · {a.flaeche} m²
                    </div>

                  {analysen.length > 1 && (
                    <button onClick={(e)=>{e.stopPropagation(); loescheAnalyse(a.id);}} style={{
                      background:'transparent', border:'none', color:'var(--muted)',
                      cursor:'pointer', fontSize:14, padding:4, lineHeight:1
                    }} title="Löschen">×</button>
                  )}
                </div>
              ))}
            </div>

            {/* Step-Indikator */}
            <div style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'1px', marginBottom:12, padding:'0 4px' }}>
              Wizard
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
              {[
                { n:1, l:'Objektdaten' },
                { n:2, l:'Finanzierung' },
                { n:3, l:'Annahmen' },
                { n:4, l:'Auswertung & Report' },
              ].map(s => (
                <div key={s.n} onClick={()=>setStep(s.n)} style={{
                  padding:'10px 12px', borderRadius:8, cursor:'pointer',
                  background: step===s.n?'var(--accent-dim)':'transparent',
                  display:'flex', alignItems:'center', gap:10
                }}>
                  <div style={{
                    width:22, height:22, borderRadius:'50%',
                    background: step>=s.n?'var(--accent)':'var(--border)',
                    color:'white', fontSize:11, fontWeight:700,
                    display:'flex', alignItems:'center', justifyContent:'center'
                  }}>{step>s.n?'✓':s.n}</div>
                  <div style={{ fontSize:13, fontWeight: step===s.n?600:500, color: step===s.n?'var(--accent)':'var(--text)' }}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Hauptbereich — Wizard-Step */}
          <div>
            <ProjektNameEditor name={aktiv.name} onChange={(name) => updateAktiv({ name })} />
            <div style={{ fontSize:13, color:'var(--muted)', marginBottom:32, padding:'0 6px' }}>
              Schritt {step} von 4 — bearbeite die Werte und gehe zum nächsten Schritt.
            </div>

            {step === 1 && <StepObjekt obj={aktiv} update={updateAktiv} />}
            {step === 2 && <StepFinanz obj={aktiv} update={updateAktiv} />}
            {step === 3 && <StepAnnahmen obj={aktiv} update={updateAktiv} />}
            {step === 4 && <StepAuswertung obj={aktiv} />}

            {/* Nav */}
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:32, paddingTop:24, borderTop:'1px solid var(--border)' }}>
              <button onClick={()=>setStep(Math.max(1, step-1))} disabled={step===1} style={{
                padding:'12px 20px', borderRadius:9,
                background:'var(--card)', border:'1px solid var(--border)',
                color: step===1?'var(--muted)':'var(--text)',
                fontSize:14, fontWeight:600, cursor: step===1?'default':'pointer',
                opacity: step===1?0.5:1, fontFamily:'inherit'
              }}>← Zurück</button>
              {step < 4 ? (
                <button onClick={()=>setStep(step+1)} style={{
                  padding:'12px 20px', borderRadius:9,
                  background:'var(--accent)', color:'white', border:'none',
                  fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
                  boxShadow:'0 2px 10px var(--accent-glow)'
                }}>Weiter →</button>
              ) : null}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:24 }}>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))', gap:14 }}>

          <NI label="Anfangstilgung" value={obj.tilgung} onChange={v=>update({tilgung:v})} suffix="%" step={0.25}/>

        <div style={{ marginTop:18, padding:'18px 20px', borderRadius:12, background:'var(--accent-dim)', border:'1px solid var(--accent)' }}>

              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, textTransform:'uppercase' }}>Darlehensbetrag</div>

// ── Step 4: Auswertung ──────────────────────────────────────────────────
function StepAuswertung({ obj }) {
  const [generating, setGenerating] = React.useState(false);
  const [pdfStatus, setPdfStatus] = React.useState('');

  const result = React.useMemo(() => computeFromObjekt(obj), [obj]);

  if (result.error) {
    return (
      <div style={{ padding:24, borderRadius:12, background:'#FEE2E2', border:'1px solid #DC2626', color:'#991B1B' }}>
        Fehler bei der Berechnung: {result.error}
      </div>
    );
  }

  const { params, analysis: a } = result;

  const generateProPDF = () => {
    setGenerating(true);
    setPdfStatus('');
    setTimeout(() => {
      try {
        if (!window.jspdf || !window.jspdf.jsPDF) {
          setPdfStatus('PDF-Bibliothek nicht geladen. Bitte Internet-Verbindung prüfen und Seite neu laden.');
          setGenerating(false);
          return;
        }
        exportProPDF(params, a);
        setPdfStatus('✓ Pro-Report erstellt');
      } catch(err) {
        console.error('Pro-PDF Fehler:', err);
        setPdfStatus('Fehler: ' + (err.message || 'Unbekannter Fehler'));
      }
      setGenerating(false);
    }, 60);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
      <ExecutiveSummary obj={obj} a={a}/>
      <DcfChartCard a={a}/>
      <DscrChartCard a={a}/>
      <SensitivityHeatmap a={a}/>
      <ScenarioCards a={a}/>

      <div style={{
        padding:'28px', borderRadius:18,
        background:'linear-gradient(135deg, var(--accent) 0%, #047857 100%)',
        color:'white', display:'flex', alignItems:'center', justifyContent:'space-between', gap:20, flexWrap:'wrap'
      }}>
        <div>
          <div style={{ fontSize:11, fontWeight:800, letterSpacing:'1.5px', opacity:0.85 }}>★ BANKFÄHIGER REPORT</div>
          <div style={{ fontSize:22, fontWeight:800, marginTop:6, letterSpacing:'-0.5px' }}>6-Seiten Pro-PDF erstellen</div>
          <div style={{ fontSize:13, opacity:0.9, marginTop:4 }}>Executive Summary · DCF · IRR/DSCR/MoM · Szenarien · Sensitivität · Tilgungsplan</div>
          {pdfStatus && (
            <div style={{ fontSize:12, marginTop:10, padding:'6px 10px', borderRadius:6, background:'rgba(255,255,255,0.15)', display:'inline-block' }}>{pdfStatus}</div>
          )}
        </div>
        <button onClick={generateProPDF} disabled={generating} style={{
          padding:'16px 28px', borderRadius:12,
          background:'white', color:'var(--accent)', border:'none',
          fontSize:15, fontWeight:800, cursor: generating?'wait':'pointer', fontFamily:'inherit',
          boxShadow:'0 4px 16px rgba(0,0,0,0.18)',
          opacity: generating?0.7:1
        }}>{generating ? 'Erstelle Report…' : '↓ Pro-Report (PDF)'}</button>
      </div>
    </div>
  );
}

function ProjektNameEditor({ name, onChange }) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal] = React.useState(name);
  const inputRef = React.useRef(null);

  React.useEffect(() => { setVal(name); }, [name]);
  React.useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  const save = () => {
    const trimmed = (val || '').trim();
    if (trimmed && trimmed !== name) onChange(trimmed);
    else setVal(name);
    setEditing(false);
  };

  const cancel = () => {
    setVal(name);
    setEditing(false);
  };

  if (editing) {
    return (
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
        <input
          ref={inputRef}
          value={val}
          onChange={e => setVal(e.target.value)}
          onKeyDown={e => {
            if (e.key === 'Enter') save();
            if (e.key === 'Escape') cancel();
          }}
          onBlur={save}
          style={{
            fontSize:28, fontWeight:800, letterSpacing:'-0.5px',
            background:'var(--bg)', border:'2px solid var(--accent)', outline:'none',
            color:'var(--text)', padding:'4px 10px', borderRadius:8,
            flex:1, fontFamily:'inherit'
          }}
        />
        <button onClick={save} title="Speichern" style={iconBtnStyle('var(--accent)', 'white')}>✓</button>
        <button onMouseDown={cancel} title="Abbrechen" style={iconBtnStyle('var(--bg)', 'var(--muted)')}>×</button>
      </div>
    );
  }

  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6, padding:'0 6px' }}>
      <h2 style={{
        fontSize:28, fontWeight:800, letterSpacing:'-0.5px',
        color:'var(--text)', margin:0, lineHeight:1.2,
        flex:1, wordBreak:'break-word'
      }}>{name}</h2>
      <button
        onClick={() => setEditing(true)}
        title="Projekt umbenennen"
        style={{
          background:'var(--bg)', border:'1px solid var(--border)',
          width:36, height:36, borderRadius:8,
          display:'flex', alignItems:'center', justifyContent:'center',
          cursor:'pointer', color:'var(--muted)',
          transition:'all 0.15s', flexShrink:0
        }}
        onMouseEnter={e => {
          e.currentTarget.style.color = 'var(--accent)';
          e.currentTarget.style.borderColor = 'var(--accent)';
        }}
        onMouseLeave={e => {
          e.currentTarget.style.color = 'var(--muted)';
          e.currentTarget.style.borderColor = 'var(--border)';
        }}
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  );
}

function DcfChartCard({ a }) {
  const noi = a.dcf.rows.map(r => r.nopat);
  const cf = a.dcf.rows.map(r => r.cfNachSteuer);
  const yMax = Math.max(...noi, 1) * 1.1;
  const yMin = Math.min(0, ...cf) * 1.2;
  const w = 760, h = 220;
  const pad = { l: 60, r: 20, t: 20, b: 30 };
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const n = noi.length;

  const px = (i) => pad.l + (i / (n - 1)) * innerW;
  const py = (v) => pad.t + innerH - ((v - yMin) / (yMax - yMin)) * innerH;

  const noiPath = noi.map((v,i) => (i===0?'M':'L') + px(i) + ',' + py(v)).join(' ');
  const cfPath = cf.map((v,i) => (i===0?'M':'L') + px(i) + ',' + py(v)).join(' ');

  return (
    <div style={{ padding:'24px 28px', borderRadius:14, background:'var(--card)', border:'1px solid var(--border)' }}>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:16, fontWeight:700 }}>DCF-Cashflow über 10 Jahre</div>
        <div style={{ fontSize:12, color:'var(--muted)' }}>Net Operating Income vs. Cashflow nach Steuer</div>
      </div>

      <div style={{ overflowX:'auto', overflowY:'hidden' }}>
        <svg viewBox={`0 0 ${w} ${h}`} style={{ width:'100%', minWidth:600, height:'auto' }}>
          {/* Grid */}
          {[0,1,2,3,4].map(i => {
            const y = pad.t + (i/4) * innerH;
            const v = yMax - (i/4) * (yMax - yMin);
            return (
              <g key={i}>
                <line x1={pad.l} y1={y} x2={w-pad.r} y2={y} stroke="var(--border)" strokeDasharray="2,3" strokeWidth="0.5"/>
                <text x={pad.l-6} y={y+3} fontSize="9" fill="var(--muted)" textAnchor="end" fontFamily='"DM Mono",monospace'>{Math.round(v/1000)}k</text>
              </g>
            );
          })}
          {/* Zero line */}
          {yMin < 0 && (
            <line x1={pad.l} y1={py(0)} x2={w-pad.r} y2={py(0)} stroke="var(--text)" strokeWidth="0.8" opacity="0.3"/>
          )}
          {/* X-Axis years */}
          {noi.map((_, i) => (
            <text key={i} x={px(i)} y={h-12} fontSize="9" fill="var(--muted)" textAnchor="middle">J{i+1}</text>
          ))}
          {/* NOI Line */}
          <path d={noiPath} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
          {/* CF Line */}
          <path d={cfPath} fill="none" stroke="var(--text)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
          {/* Points NOI */}
          {noi.map((v,i) => <circle key={'n'+i} cx={px(i)} cy={py(v)} r="3" fill="var(--accent)" stroke="var(--card)" strokeWidth="1.5"/>)}
          {cf.map((v,i) => <circle key={'c'+i} cx={px(i)} cy={py(v)} r="2.5" fill="var(--text)" stroke="var(--card)" strokeWidth="1.5"/>)}
        </svg>
      </div>

      <div style={{ display:'flex', gap:18, marginTop:8, fontSize:12 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:14, height:3, background:'var(--accent)' }}/><span style={{color:'var(--muted)'}}>NOI (Net Operating Income)</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:14, height:3, background:'var(--text)' }}/><span style={{color:'var(--muted)'}}>Cashflow nach Steuer</span>
        </div>
      </div>
    </div>
  );
}

function ScenarioPreview({ obj }) {
  const result = React.useMemo(() => computeFromObjekt(obj), [obj]);
  if (result.error || !result.analysis) return <div style={{color:'var(--muted)'}}>Vorschau nicht verfügbar.</div>;
  return <ScenarioCards a={result.analysis}/>;
}

// Vergleichs-View
function CompareView({ analysen, compareIds, setCompareIds }) {
  const toggle = (id) => {
    if (compareIds.includes(id)) {
      setCompareIds(compareIds.filter(i => i !== id));
    } else if (compareIds.length < 3) {
      setCompareIds([...compareIds, id]);
    }
  };

  const selected = compareIds.map(id => analysen.find(a => a.id === id)).filter(Boolean);
  const computed = selected.map(o => ({ obj: o, ...computeFromObjekt(o) }));

  return (
    <div style={{ maxWidth:1440, margin:'0 auto', padding:'32px' }}>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:24, fontWeight:800, letterSpacing:'-0.5px' }}>Vergleich</div>
        <div style={{ fontSize:13, color:'var(--muted)', marginTop:4 }}>Wähle 2-3 Analysen für direkten Vergleich aus.</div>
      </div>

      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:28 }}>
        {analysen.map(a => {
          const selected = compareIds.includes(a.id);
          return (
            <button key={a.id} onClick={()=>toggle(a.id)} style={{
              padding:'10px 14px', borderRadius:9,
              background: selected?'var(--accent-dim)':'var(--card)',
              border: `1.5px solid ${selected?'var(--accent)':'var(--border)'}`,
              color: selected?'var(--accent)':'var(--text)',
              fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit'
            }}>
              {selected && '✓ '}{a.name}
            </button>
          );
        })}
      </div>

      {computed.length === 0 ? (
        <div style={{ padding:'60px 30px', textAlign:'center', borderRadius:14, background:'var(--card)', border:'1px dashed var(--border)' }}>
          <div style={{ fontSize:40, marginBottom:8, opacity:0.4 }}>⚖️</div>
          <div style={{ fontWeight:700, marginBottom:4 }}>Keine Auswahl</div>
          <div style={{ fontSize:13, color:'var(--muted)' }}>Wähle oben mindestens 2 Analysen zum Vergleichen.</div>
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:`repeat(${computed.length}, 1fr)`, gap:16 }}>
          {computed.map(({ obj, analysis: a, error }, i) => (
            <div key={i} style={{ padding:'24px', borderRadius:14, background:'var(--card)', border:'1px solid var(--border)' }}>
              <div style={{ fontSize:13, fontWeight:800, color:'var(--accent)', marginBottom:4, letterSpacing:'0.5px', textTransform:'uppercase' }}>OPTION {String.fromCharCode(65+i)}</div>
              <div style={{ fontSize:18, fontWeight:800, marginBottom:14 }}>{obj.name}</div>
              {error ? (
                <div style={{ color:'#DC2626' }}>{error}</div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  <CompareRow l="Kaufpreis" v={obj.kaufpreis.toLocaleString('de-DE') + ' €'}/>
                  <CompareRow l="m² / Baujahr" v={`${obj.flaeche} m² · ${obj.baujahr}`}/>
                  <CompareRow l="EK / LTV" v={`${(obj.ek/1000).toFixed(0)}k € · ${a.ltv.toFixed(0)}%`}/>
                  <div style={{ height:1, background:'var(--border)', margin:'4px 0' }}/>
                  <CompareRow l="IRR n.St." v={a.irrNach.toFixed(1)+'%'} highlight={'var(--accent)'}/>
                  <CompareRow l="DSCR min" v={a.minDscr.toFixed(2)} highlight={a.minDscr >= 1.2 ? 'var(--accent)' : '#DC2626'}/>
                  <CompareRow l="MoM" v={a.mom.toFixed(2)+'×'}/>
                  <CompareRow l="CF J1 n.St." v={(a.dcf.rows[0].cfNachSteuer >= 0 ? '+' : '')+Math.round(a.dcf.rows[0].cfNachSteuer)+' €'} highlight={a.dcf.rows[0].cfNachSteuer >= 0 ? 'var(--accent)' : '#DC2626'}/>
                  <CompareRow l="Exit (10J Base)" v={Math.round(a.szenarien.base.exit/1000)+'k €'}/>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CompareRow({ l, v, highlight }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
      <span style={{ fontSize:12, color:'var(--muted)' }}>{l}</span>
      <span style={{ fontFamily:'"DM Mono",monospace', fontSize:14, fontWeight:700, color: highlight || 'var(--text)' }}>{v}</span>
    </div>
  );
}

function ReviewSlider() {
  const [page, setPage] = React.useState(0);
  const [perView, setPerView] = React.useState(typeof window !== 'undefined' && window.innerWidth <= 768 ? 1 : window.innerWidth <= 1100 ? 2 : 3);
  const touchStartX = React.useRef(null);

  React.useEffect(() => {
    const onResize = () => {
      const w = window.innerWidth;
      const next = w <= 768 ? 1 : w <= 1100 ? 2 : 3;
      setPerView(next);
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const totalPages = Math.ceil(REVIEWS.length / perView);
  const safePage = Math.min(page, totalPages - 1);

  // Reset auf Seite 0 wenn perView wechselt und aktuelle Seite out-of-bounds
  React.useEffect(() => {
    if (page >= totalPages) setPage(0);
  }, [perView, totalPages, page]);

  const next = () => setPage((p) => (p + 1) % totalPages);
  const prev = () => setPage((p) => (p - 1 + totalPages) % totalPages);

  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStartX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 50) {
      if (dx < 0) next(); else prev();
    }
    touchStartX.current = null;
  };

  const startIdx = safePage * perView;
  const visibleReviews = REVIEWS.slice(startIdx, startIdx + perView);

  return (
    <div style={{ position:'relative' }}>
      {/* Pfeil links */}
      <button
        onClick={prev}
        aria-label="Vorherige Bewertungen"
        style={sliderArrowStyle('left')}
        onMouseEnter={e => { e.currentTarget.style.background='var(--accent)'; e.currentTarget.style.color='white'; e.currentTarget.style.borderColor='var(--accent)'; }}
        onMouseLeave={e => { e.currentTarget.style.background='var(--card)'; e.currentTarget.style.color='var(--text)'; e.currentTarget.style.borderColor='var(--border)'; }}
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      {/* Cards */}
      <div
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
        className="review-slider-cards"
        style={{
          display:'grid',
          gridTemplateColumns: `repeat(${perView}, 1fr)`,
          gap:16,
          padding: '0 56px',
          minHeight: 220,
        }}
      >
        {visibleReviews.map((r, i) => (
          <div key={`${safePage}-${i}`} style={{
            background:'var(--card)', borderRadius:16, padding:'24px',
            border:'1px solid var(--border)',
            display:'flex', flexDirection:'column',
            animation: 'fadeIn 0.35s ease',
            boxShadow: '0 1px 3px rgba(0,0,0,0.02)'
          }}>
            <StarRating n={r.stars} />
            <p style={{ fontSize:14, color:'var(--text)', lineHeight:1.7, margin:'14px 0 18px', fontStyle:'italic', flex:1 }}>"{r.text}"</p>
            <div style={{ paddingTop:14, borderTop:'1px solid var(--border)' }}>
              <div style={{ fontSize:13, fontWeight:700 }}>{r.name}</div>
              <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>{r.role}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Pfeil rechts */}
      <button
        onClick={next}
        aria-label="Nächste Bewertungen"
        style={sliderArrowStyle('right')}
        onMouseEnter={e => { e.currentTarget.style.background='var(--accent)'; e.currentTarget.style.color='white'; e.currentTarget.style.borderColor='var(--accent)'; }}
        onMouseLeave={e => { e.currentTarget.style.background='var(--card)'; e.currentTarget.style.color='var(--text)'; e.currentTarget.style.borderColor='var(--border)'; }}
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      {/* Dots */}
      <div style={{ display:'flex', justifyContent:'center', gap:8, marginTop:24 }}>
        {Array.from({length: totalPages}).map((_, i) => (
          <button
            key={i}
            onClick={() => setPage(i)}
            aria-label={`Zu Seite ${i+1}`}
            style={{
              width: i === safePage ? 24 : 8,
              height: 8,
              borderRadius: 99,
              background: i === safePage ? 'var(--accent)' : 'var(--border)',
              border: 'none',
              cursor: 'pointer',
              transition: 'all 0.25s cubic-bezier(0.4,0,0.2,1)',
              padding: 0,
            }}
          />
        ))}
      </div>

      {/* Counter */}
      <div style={{ textAlign:'center', marginTop:10, fontSize:11, color:'var(--muted)', fontFamily:'"DM Mono",monospace', letterSpacing:'0.5px' }}>
        {String(safePage + 1).padStart(2, '0')} / {String(totalPages).padStart(2, '0')}
      </div>
    </div>
  );
}

function sliderArrowStyle(side) {
  return {
    position:'absolute',
    top: '50%',
    [side]: 0,
    transform: 'translateY(calc(-50% - 17px))', // -17px wegen Dots-Offset darunter
    width: 44, height: 44, borderRadius:'50%',
    background:'var(--card)',
    border:'1px solid var(--border)',

  };
}

        renditerechner:   <Renditerechner />,
        foerderfinder:    <Foerderfinder />,
        potenzialanalyse: <Potenzialanalyse />,
        energieausweis:   <Energieausweis />,
        sanierungswissen: <Sanierungswissen />,
        pro:              <ProSuite />,
        ueber:            <Ueber />,
      };

      return (
        <>
          <AppNav route={route} nav={nav} />
          <div key={route} className="page-enter">
            {pages[route] || pages['uebersicht']}
          </div>
          <AppFooter nav={nav} />
          <CookieBanner />
          {tweaksOpen && <TweaksPanel tweaks={tweaks} update={update} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ProProvider><App /></ProProvider>);
  </script>
</head>
<body>
  <div id="root"></div>
  <button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</body>
</html>
